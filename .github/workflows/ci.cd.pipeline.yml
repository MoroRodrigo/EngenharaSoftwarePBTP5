name: CI/CD Pipeline - TP5

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Permite execução manual

jobs:
  build_and_test:
    name: Build, Test e Análise (SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Executar Build e Testes (JUnit/Jqwik)
        run: ./gradlew build jacocoTestReport

      # TP5: Log personalizado para depuração
      - name: Log de Cobertura
        run: echo "::notice title=Testes Concluídos::Testes unitários e de propriedades finalizados. Verifique o relatório JaCoCo."

      - name: Análise Estática (Simulação SAST/Sonar)
        run: |
          echo "Executando varredura de segurança no código..."
          # ./gradlew sonarqube (simulado)

      - name: Upload Artefato de Build
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/*.jar

  deploy_homologacao:
    name: Deploy em Homologação
    needs: build_and_test
    runs-on: ubuntu-latest
    environment: homologacao # TP5: Proteção de ambiente
    steps:
      - name: Deploy Simulado
        env:
          API_KEY: ${{ secrets.HOMOLOG_API_KEY }} # TP5: Uso seguro de variáveis
        run: |
          echo "Realizando deploy em ambiente de Homologação usando OIDC..."
          echo "::notice title=Deploy HOMOLOG::Deploy concluído com sucesso."

  deploy_producao:
    name: Deploy em Produção
    needs: deploy_homologacao
    runs-on: ubuntu-latest
    environment: producao # Requer aprovação manual configurada nas settings do repo
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Simulado
        env:
          PROD_DB_PWD: ${{ secrets.PROD_DB_PASSWORD }}
        run: |
          echo "Realizando deploy no ambiente de Produção..."

      - name: Configurar Chrome para Selenium
        uses: browser-actions/setup-chrome@v1

      - name: Testes Pós-Deploy com Selenium
        env:
          APP_URL: ${{ vars.PROD_URL }}
        run: |
          echo "Iniciando bateria de testes UI em Produção..."
          ./gradlew test --tests "com.empresa.sistema.e2e.SeleniumPostDeployTest"
          echo "::notice title=Health Check Produção::Testes pós-deploy passaram com sucesso!"