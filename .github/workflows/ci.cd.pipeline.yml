name: CI/CD Pipeline - TP5

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

env:
  # Resolve o alerta de depreciação do Node.js 20
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_and_test:
    name: Build, Test e Analise (SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21' # Alterado para 21 para alinhar com seu pom.xml
          distribution: 'temurin'
          cache: maven # Alterado de gradle para maven

      - name: Executar Build e Testes (JUnit/Jqwik)
        # Comando Maven para compilar, testar e gerar relatorio Jacoco
        run: mvn clean verify

      - name: Log de Cobertura
        run: echo "::notice title=Testes Concluidos::Testes unitarios e de propriedades finalizados via Maven. Verifique o relatorio JaCoCo."

      - name: Analise Estatica (Simulacao SAST)
        run: echo "Executando varredura de seguranca no codigo fonte..."

      - name: Upload Artefato de Build
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar # Maven coloca os arquivos na pasta target, nao build

  deploy_homologacao:
    name: Deploy em Homologacao
    needs: build_and_test
    runs-on: ubuntu-latest
    environment: homologacao
    steps:
      - name: Deploy Simulado
        env:
          API_KEY: ${{ secrets.HOMOLOG_API_KEY }}
        run: |
          echo "Realizando deploy em ambiente de Homologacao..."
          echo "::notice title=Deploy HOMOLOG::Deploy concluido com sucesso."

  deploy_producao:
    name: Deploy em Producao
    needs: deploy_homologacao
    runs-on: ubuntu-latest
    environment: producao
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Simulado
        env:
          PROD_DB_PWD: ${{ secrets.PROD_DB_PASSWORD }}
        run: echo "Realizando deploy no ambiente de Producao..."

      - name: Configurar Chrome para Selenium
        uses: browser-actions/setup-chrome@v1

      - name: Testes Pos-Deploy com Selenium
        env:
          APP_URL: ${{ vars.PROD_URL }}
        # Comando Maven para rodar apenas o teste especifico do Selenium
        run: mvn test -Dtest=SeleniumPostDeployTest

      - name: Log Final
        run: echo "::notice title=Health Check Producao::Testes pos-deploy com Selenium concluidos com sucesso!"